version: '3.8'



services:

  backend:

    build: .

    container_name: flashspace-backend

    restart: always

    ports:

      - "5000:5000"

    environment:

      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_URI=mongodb://mongo:27017/myapp # Use fixed mongo container URI inside docker network

      # Redis & DB URIs now come from .env (REDIS_URL, DB_URI)

    env_file:

      - .env

    volumes:

      - ./src/flashspaceWeb/meetingSchedulerModule/google-tokens.json:/app/dist/flashspaceWeb/meetingSchedulerModule/google-tokens.json

      - ./uploads:/app/uploads

    depends_on:
      - redis
      - mongo

    networks:
      - flashspace-network



  redis:
    image: redis:alpine
    container_name: flashspace-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - flashspace-network

  mongo:
    image: mongo:latest
    container_name: flashspace-mongo
    restart: always
    ports:
      - "27018:27017" # Expose to host on 27018
    volumes:
      - mongo-data:/data/db
    networks:
      - flashspace-network



networks:

  flashspace-network:

    driver: bridge



volumes:

  mongo-data:

    driver: local
